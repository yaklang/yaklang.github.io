name: Package Site Content

# 把 yaklang.github.io 当前状态下的 docs/ + products/ + blog/ 内容源打包成 zip,
# 上传到阿里云 OSS, 供后续构建搜索系统使用。zip 内文件名本身编码了 source 与
# relPath, 可恢复出对应网站 URL, INDEX.json/INDEX.ndjson 给出权威映射。
#
# 注意: 本 workflow 与 publish-to-oss.yml 完全独立, 互不依赖; 它只打包内容源,
# 不构建站点也不部署。
#
# 触发:
#   - workflow_dispatch: 手动触发, 可带 note 备注
#   - push 到任意分支, 且改动命中 docs/** | products/** | blog/** | 本脚本 | 本 workflow
#   - push v* tag (与 publish-to-oss.yml 同款 tag 触发对齐)
# 注意: GitHub Actions 不允许在同一 workflow 里写两个顶层 on.push, 而 paths 与 tags
# 在同一 push 事件里互斥。因此这里用一个 push 块同时声明 branches + tags(无 paths),
# 路径过滤在 job 内用 changes filter 实现。
on:
  workflow_dispatch:
    inputs:
      note:
        description: "Optional note recorded into the package bookkeeping file"
        required: false
        default: ""
        type: string
  push:
    branches:
      - "**"
    tags:
      - "v*"

jobs:
  package:
    runs-on: ubuntu-latest
    # 只有 tag 触发或 workflow_dispatch 触发时才会回写记账文件到 master;
    # 普通分支 push(例如 PR 分支) 只上传 OSS, 不污染 master 记账。
    permissions:
      contents: write
    outputs:
      should_run: ${{ steps.filter.outputs.should_run }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # master 是受保护分支, 默认 GITHUB_TOKEN 推 master 会被 branch protection 拒绝(GH006)。
          # 用 GH_TOKEN(PAT) checkout, 后续 commit step 的 git push 才能推回 master。
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0

      - name: Filter paths
        id: filter
        # 仅在以下情况实际执行后续步骤:
        #   - workflow_dispatch
        #   - push 到 v* tag
        #   - push 到分支且改动命中 docs/** | products/** | blog/** | 本脚本 | 本 workflow
        # 否则跳过整个 job(标记 should_run=false)。用 bash 实现以保持零额外 action 依赖。
        run: |
          set -e
          EVENT="${{ github.event_name }}"
          REF="${{ github.ref }}"
          if [ "${EVENT}" = "workflow_dispatch" ]; then
            echo "triggered by workflow_dispatch, will run"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ "${REF}" == refs/tags/v* ]]; then
            echo "triggered by v* tag ${REF}, will run"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # 分支 push: 用 git diff 检查目标路径是否被改动
          PATTERNS=(
            "docs/"
            "products/"
            "blog/"
            "scripts/package-site-content.js"
            "scripts/gen-site-packages.js"
            ".github/workflows/package-site-content.yml"
          )
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.event.after }}"
          if [ -z "${BEFORE}" ] || [ "${BEFORE}" = "0000000000000000000000000000000000000000" ]; then
            echo "no before SHA (new branch or force push), will run"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CHANGED=$(git diff --name-only "${BEFORE}" "${AFTER}" 2>/dev/null || true)
          HIT="false"
          for line in ${CHANGED}; do
            for pat in "${PATTERNS[@]}"; do
              if [[ "${line}" == ${pat}* ]]; then
                HIT="true"
                break
              fi
            done
            if [ "${HIT}" = "true" ]; then
              break
            fi
          done
          if [ "${HIT}" = "true" ]; then
            echo "branch push matched watched paths, will run"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "branch push did not match watched paths, skip"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Use Node.js
        if: ${{ steps.filter.outputs.should_run == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Resolve date and existing archives
        if: ${{ steps.filter.outputs.should_run == 'true' }}
        id: date
        run: |
          set -e
          DATE=$(date -u +%Y-%m-%d)
          OSS_BASE="https://aliyun-oss.yaklang.com"
          # 探测当天已有哪些归档: 第 1 个是 yaklang-com-docs-DATE.zip,
          # 之后是 yaklang-com-docs-DATE-1.zip, -2.zip, ...
          # 找第一个不存在的编号作为本次归档名。
          IDX=0
          while true; do
            if [ "${IDX}" = "0" ]; then
              SUFFIX=""
            else
              SUFFIX="-${IDX}"
            fi
            NAME="yaklang-com-docs-${DATE}${SUFFIX}.zip"
            URL="${OSS_BASE}/yak/docs/${DATE}/${NAME}"
            if curl -fsSI "${URL}" 2>/dev/null | grep -qiE '^HTTP/[0-9.]+ 200'; then
              echo "exists: ${URL}, try next"
              IDX=$((IDX + 1))
              continue
            fi
            # 第 1 次找到不存在的归档名(无后缀算 0 号, 文件名为 yaklang-com-docs-DATE.zip)
            # 记账用的 id: 无后缀写 DATE, 否则 DATE-N
            if [ "${IDX}" = "0" ]; then
              ID="${DATE}"
            else
              ID="${DATE}-${IDX}"
            fi
            echo "date=${DATE}" >> "$GITHUB_OUTPUT"
            echo "zip_name=${NAME}" >> "$GITHUB_OUTPUT"
            echo "zip_id=${ID}" >> "$GITHUB_OUTPUT"
            echo "oss_path=/yak/docs/${DATE}/${NAME}" >> "$GITHUB_OUTPUT"
            echo "resolved zip name: ${NAME} (id=${ID})"
            exit 0
          done

      - name: Selftest packager
        if: ${{ steps.filter.outputs.should_run == 'true' }}
        run: |
          node scripts/package-site-content.js --selftest

      - name: Package site content
        if: ${{ steps.filter.outputs.should_run == 'true' }}
        id: pkg
        env:
          ZIP_NAME: ${{ steps.date.outputs.zip_name }}
        run: |
          set -e
          node scripts/package-site-content.js tmp_package
          # 解析脚本写出的 .summary 文件(避免重打包两次)
          if [ ! -f tmp_package/.summary ]; then
            echo "FATAL: tmp_package/.summary not found"
            exit 1
          fi
          COUNT=$(sed -nE 's/^count=([0-9]+).*/\1/p' tmp_package/.summary | tr -d '\r')
          SIZE=$(sed -nE 's/^sizeBytes=([0-9]+).*/\1/p' tmp_package/.summary | tr -d '\r')
          echo "count=${COUNT}" >> "$GITHUB_OUTPUT"
          echo "size_bytes=${SIZE}" >> "$GITHUB_OUTPUT"
          ls -lh tmp_package/

      - name: Upload artifact
        if: ${{ steps.filter.outputs.should_run == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: site-content-package
          path: |
            tmp_package/${{ steps.date.outputs.zip_name }}
            tmp_package/INDEX.json
            tmp_package/INDEX.ndjson
            tmp_package/MANIFEST.txt
          if-no-files-found: error
          retention-days: 30

      - name: Download yak binary (OSS uploader)
        if: ${{ steps.filter.outputs.should_run == 'true' }}
        run: |
          # 与 yaklang 主仓 generate-web-doc.yml 同款工具
          wget -q -O yak https://aliyun-oss.yaklang.com/yak/latest/yak_linux_amd64
          chmod +x yak

      - name: Upload to Aliyun OSS
        if: ${{ steps.filter.outputs.should_run == 'true' }}
        env:
          OSS_KEY_ID: ${{ secrets.OSS_KEY_ID }}
          OSS_KEY_SECRET: ${{ secrets.OSS_KEY_SECRET }}
        run: |
          set -e
          ZIP_NAME="${{ steps.date.outputs.zip_name }}"
          OSS_PATH="${{ steps.date.outputs.oss_path }}"
          ./yak upload-oss -b yaklang \
            --ak "${OSS_KEY_ID}" \
            --sk "${OSS_KEY_SECRET}" \
            -t 5 \
            -f "tmp_package/${ZIP_NAME}:${OSS_PATH}"
          echo "Uploaded ${ZIP_NAME} to oss path ${OSS_PATH}"

      - name: Update bookkeeping
        if: ${{ steps.filter.outputs.should_run == 'true' }}
        run: |
          set -e
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          ZIP_ID="${{ steps.date.outputs.zip_id }}"
          DATE="${{ steps.date.outputs.date }}"
          ZIP_NAME="${{ steps.date.outputs.zip_name }}"
          COUNT="${{ steps.pkg.outputs.count }}"
          SIZE="${{ steps.pkg.outputs.size_bytes }}"
          OSS_URL="https://aliyun-oss.yaklang.com/yak/docs/${DATE}/${ZIP_NAME}"
          NOTE="${{ github.event.inputs.note }}"

          # 更新记账文件(最新追加在末尾)
          touch old_site_packages.txt
          printf '%s\t%s\t%s\t%s' "${ZIP_ID}" "${NOW}" "${OSS_URL}" "${COUNT}" >> old_site_packages.txt
          if [ -n "${NOTE}" ]; then
            printf '\t%s' "${NOTE}" >> old_site_packages.txt
          fi
          printf '\n' >> old_site_packages.txt

          # 由记账文件重新生成供前端读取的 static/site-packages.json(最新置顶)
          node scripts/gen-site-packages.js

          # 同步供前端搜索使用的同源内容包(零 CORS): latest.zip + latest.json
          # latest.json 只放版本元信息, 前端读取它判断是否需要重建本地索引,
          # 不必先下载 zip 即可比对版本。
          mkdir -p static/site-content
          cp -f "tmp_package/${ZIP_NAME}" static/site-content/latest.zip
          cat > static/site-content/latest.json <<EOF
          {
            "id": "${ZIP_ID}",
            "zipName": "${ZIP_NAME}",
            "generatedAt": "${NOW}",
            "date": "${DATE}",
            "count": ${COUNT:-0},
            "sizeBytes": ${SIZE:-0},
            "zipPath": "/site-content/latest.zip"
          }
          EOF

      - name: Commit bookkeeping to master
        # 只有 tag 或 manual 触发时才回写 master 记账; 分支 push(含 PR)只上传 OSS。
        if: ${{ steps.filter.outputs.should_run == 'true' && (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch') }}
        run: |
          set -e
          # checkout 已用 GH_TOKEN, 这里直接 push 即可越过 branch protection
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          ZIP_NAME="${{ steps.date.outputs.zip_name }}"
          git add old_site_packages.txt static/site-packages.json
          # latest.zip/latest.json 已被 .gitignore 忽略(避免 dev mock 污染仓库),
          # CI 用 -f 强制纳入生产版本。
          git add -f static/site-content/latest.zip static/site-content/latest.json
          if git diff --cached --quiet; then
            echo "no bookkeeping changes to commit"
            exit 0
          fi
          git commit -m "chore(site-package): archive ${ZIP_NAME}"
          # workflow_dispatch 在 master 分支上跑, git push 即可;
          # tag 触发时处于 detached HEAD(检出到 tag commit), 必须显式
          # 指定目标分支推回 master, 否则会得到 "You are not currently on a branch"。
          if [ "${GITHUB_REF}" = "refs/heads/master" ]; then
            git push
          else
            git push origin "HEAD:master"
          fi
